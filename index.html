<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#0c0c0e" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Zeitrechner</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-192.png" />
<style>
  :root{
    --bg:#0c0c0e;
    --panel:#16161a;
    --panel-2:#1d1d22;
    --key:#222227;
    --key-press:#2c2c33;
    --line:#2a2a30;
    --txt:#f5f3ef;
    --muted:#7d7d86;
    --amber:#e8943a;
    --amber-soft:#3a2c18;
    --red:#b84a3f;
    --green:#5aa66a;
    --radius:20px;
    --safe-b:env(safe-area-inset-bottom,0px);
    --safe-t:env(safe-area-inset-top,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;overflow:hidden;
    background:var(--bg);color:var(--txt);
    font-family:"SF Pro Display",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    user-select:none;-webkit-user-select:none;
    overscroll-behavior:none;
  }
  button{touch-action:manipulation;}
  /* position:fixed ist auf iOS Safari zuverlässiger als vh/dvh-Höhen-Kaskaden */
  .app{
    position:fixed;top:0;right:0;bottom:0;left:0;
    max-width:480px;margin:0 auto;
    overflow:hidden;
    display:flex;flex-direction:column;
    padding:calc(var(--safe-t) + 6px) 12px 0;
  }

  /* ---- Top bar: mode switch ---- */
  .modebar{
    display:flex;gap:6px;padding:5px;
    background:var(--panel);border-radius:16px;
    margin-bottom:8px;flex:0 0 auto;
    align-items:center;
  }
  .modebar .modetab{
    flex:1;border:0;background:transparent;color:var(--muted);
    font-size:14px;font-weight:600;letter-spacing:.3px;
    padding:9px 0;border-radius:12px;cursor:pointer;
    transition:background .18s,color .18s;
    font-family:inherit;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .modebar .modetab.active{background:var(--key);color:var(--txt);}
  .info-btn{
    width:30px;height:30px;border-radius:50%;border:0;cursor:pointer;
    background:#2b2b31;color:var(--muted);
    font-size:15px;font-style:italic;font-family:Georgia,serif;
    display:flex;align-items:center;justify-content:center;
    flex:0 0 auto;margin-left:2px;
  }
  .info-btn:active{background:var(--key-press);}

  /* ---- Tape (Verlauf) ---- */
  .tape-wrap{
    flex:1 1 auto;min-height:0;
    background:var(--panel);border-radius:var(--radius);
    display:flex;flex-direction:column;overflow:hidden;
    margin-bottom:8px;
  }
  .tape{
    flex:1 1 auto;overflow-y:auto;padding:8px 4px 2px;
    -webkit-overflow-scrolling:touch;
  }
  .tape::-webkit-scrollbar{width:0;}
  .row{
    display:flex;align-items:center;gap:10px;
    padding:7px 12px;border-radius:12px;margin:2px 4px;
    background:var(--panel-2);
  }
  .row .idx{
    width:24px;height:24px;border-radius:50%;flex:0 0 auto;
    background:#2b2b31;color:var(--muted);
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:600;
  }
  .row .op{color:var(--amber);font-size:18px;font-weight:600;width:14px;text-align:center;flex:0 0 auto;}
  .row .val{
    flex:1 1 auto;
    min-width:0;
    text-align:right;
    font-size:20px;font-weight:600;letter-spacing:.5px;font-variant-numeric:tabular-nums;
  }
  .tape-empty{
    color:var(--muted);font-size:13px;text-align:center;
    padding:16px 14px;line-height:1.5;
  }
  .total{
    flex:0 0 auto;border-top:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 16px;
  }
  .total .lbl{color:var(--muted);font-size:12px;font-weight:700;letter-spacing:2px;}
  .total .right{display:flex;align-items:center;gap:12px;}
  .total .sum{color:var(--amber);font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;}
  .undo{
    width:30px;height:30px;border-radius:50%;border:0;cursor:pointer;
    background:#2b2b31;color:var(--muted);font-size:15px;
    display:flex;align-items:center;justify-content:center;
  }
  .undo:active{background:var(--key-press);}
  .row.sum-divider{background:var(--amber-soft);border:1px solid rgba(232,148,58,.22);}
  .row.sum-divider .sum-eq{color:var(--amber);font-size:18px;font-weight:700;width:24px;text-align:center;flex:0 0 auto;}
  .row.sum-divider .val{color:var(--amber);}

  /* ---- Live display ---- */
  .display{
    flex:0 0 auto;text-align:right;
    padding:0 12px 4px;
    font-variant-numeric:tabular-nums;
    display:flex;flex-direction:column;justify-content:flex-end;
  }
  .display .pending{color:var(--muted);font-size:16px;height:20px;line-height:20px;font-weight:500;letter-spacing:.5px;}
  .display .current{color:var(--amber);font-size:clamp(40px,11vw,58px);font-weight:600;line-height:1;letter-spacing:1px;}

  /* ---- Keypad ---- */
  .pad{
    flex:0 0 auto;
    display:grid;gap:7px;
    grid-template-columns:repeat(4,1fr);
    padding-bottom:4px; /* Browser-Modus: nur mini Abstand */
  }
  /* PWA/Standalone: native App-Optik – Keypad bewusst näher an den unteren Rand */
  @media (display-mode: standalone){
    .pad{ padding-bottom:8px; }
  }
  .pad button{
    border:0;border-radius:16px;cursor:pointer;
    font-family:inherit;font-weight:500;
    height:clamp(54px,8.8vh,74px);
    font-size:clamp(22px,6vw,28px);
    color:var(--txt);background:var(--key);
    display:flex;align-items:center;justify-content:center;
    position:relative;overflow:hidden;
    transition:transform .06s ease-out, background .10s ease-out, filter .10s ease-out, box-shadow .10s ease-out;
    will-change:transform,filter;
  }
  .pad button::after{
    content:"";
    position:absolute;inset:0;border-radius:inherit;
    background:rgba(255,255,255,.16);
    opacity:0;transform:scale(.72);
    pointer-events:none;
  }
  .pad button:active,
  .pad button.is-pressed{
    transform:translateY(2px) scale(.90);
    filter:brightness(1.28) saturate(1.08);
    box-shadow:inset 0 3px 8px rgba(0,0,0,.34), 0 0 0 1px rgba(255,255,255,.08);
  }
  .pad button.is-pressed::after{
    opacity:1;
    transform:scale(1);
  }
  .pad button.key-pop{
    animation:key-pop .24s cubic-bezier(.2,1.35,.35,1);
  }
  .pad button.key-pop::after{
    animation:key-flash .24s ease-out;
  }
  @keyframes key-pop{
    0%{transform:translateY(2px) scale(.90);}
    48%{transform:translateY(-1px) scale(1.065);}
    72%{transform:scale(.985);}
    100%{transform:scale(1);}
  }
  @keyframes key-flash{
    0%{opacity:.55;transform:scale(.74);}
    100%{opacity:0;transform:scale(1.18);}
  }
  @media (prefers-reduced-motion: reduce){
    .pad button{
      transition:filter .10s ease-out, box-shadow .10s ease-out;
    }
    .pad button:active,
    .pad button.is-pressed{
      transform:none;
      filter:brightness(1.2);
      box-shadow:inset 0 3px 8px rgba(0,0,0,.28);
    }
    .pad button.key-pop,
    .pad button.key-pop::after{
      animation:none;
    }
  }
  .pad .fn{color:var(--muted);}
  .pad .clear{background:#3a201d;color:var(--red);font-weight:700;}
  .pad .clear-soft{background:var(--key);color:var(--red);font-weight:700;}
  .pad .op{background:var(--amber-soft);color:var(--amber);font-weight:600;}
  .pad .op.armed{background:var(--amber);color:#1b1206;}
  .pad .eq{background:#4f9d61;color:#0c1a0f;font-weight:700;}
  .pad .wide{grid-column:span 2;}
  .pad .colon{font-size:clamp(22px,5.6vw,26px);}
  .pad .colon.armed{background:var(--amber-soft);color:var(--amber);}

  /* ---- About overlay ---- */
  .about-overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,.72);
    display:flex;align-items:center;justify-content:center;
    z-index:100;
  }
  .about-dialog{
    background:var(--panel);border-radius:var(--radius);
    padding:28px 24px 24px;text-align:center;max-width:280px;width:90%;
    display:flex;flex-direction:column;align-items:center;gap:10px;
  }
  .about-icon{width:80px;height:80px;border-radius:20px;}
  .about-title{margin:0;font-size:22px;font-weight:700;color:var(--txt);}
  .about-sub{margin:0;font-size:13px;color:var(--muted);line-height:1.5;}
  .about-version{margin:0;font-size:12px;color:var(--muted);opacity:.6;font-variant-numeric:tabular-nums;letter-spacing:.5px;}
  .about-close{
    margin-top:8px;border:0;border-radius:12px;cursor:pointer;
    background:var(--key);color:var(--txt);font-family:inherit;
    font-size:15px;font-weight:600;padding:10px 28px;
  }
  .about-close:active{background:var(--key-press);}
</style>
</head>
<body>
<div class="app">
  <div class="modebar" id="modebar">
    <button data-mode="time" class="modetab active"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Zeit</button>
    <button data-mode="num" class="modetab"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="10" x2="16" y2="14"/><line x1="8" y1="10" x2="8" y2="10"/><line x1="12" y1="10" x2="12" y2="10"/><line x1="8" y1="14" x2="8" y2="14"/><line x1="12" y1="14" x2="12" y2="14"/><line x1="8" y1="18" x2="12" y2="18"/></svg>Rechner</button>
    <button class="info-btn" id="infoBtn" aria-label="Über die App">i</button>
  </div>

  <div class="tape-wrap">
    <div class="tape" id="tape"></div>
    <div class="total">
      <span class="lbl">SUMME</span>
      <div class="right">
        <button class="undo" id="undo" aria-label="Letzten Schritt zurück">↺</button>
        <span class="sum" id="sum">0</span>
      </div>
    </div>
  </div>

  <div class="display">
    <div class="pending" id="pending"></div>
    <div class="current" id="current">0</div>
  </div>

  <div class="pad" id="pad"></div>
</div>

<div id="aboutOverlay" class="about-overlay" style="display:none" role="dialog" aria-modal="true" aria-label="Über die App">
  <div class="about-dialog">
    <img class="about-icon" src="icon-192.png" alt="" />
    <h2 class="about-title">Zeitrechner</h2>
    <p class="about-sub">Rechnen mit Zeiten und Zahlen.</p>
    <p class="about-version">__COMMIT__</p>
    <button class="about-close" id="aboutClose">Schließen</button>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* ---------- State ---------- */
  var mode = "time";            // "time" | "num"
  var entry = "";               // rohe Eingabe als String
  var steps = [];               // {op:'+'|'-'|'*'|'/'|null, value:Number} | {type:'sum', value:Number}
  var lastEntryWasResult = false;
  var pendingOp = null;         // Operator, der auf den nächsten committeten Wert wartet
  var ready = false;

  // Getrennter Zustand je Modus.
  var saved = {
    time: { entry:"", steps:[], lastEntryWasResult:false, pendingOp:null },
    num:  { entry:"", steps:[], lastEntryWasResult:false, pendingOp:null }
  };

  function captureState(){
    saved[mode] = {
      entry: entry,
      steps: steps.slice(),
      lastEntryWasResult: lastEntryWasResult,
      pendingOp: pendingOp
    };
  }
  function restoreState(m){
    var s = saved[m];
    entry = s.entry;
    steps = s.steps.slice();
    lastEntryWasResult = s.lastEntryWasResult;
    pendingOp = s.pendingOp;
  }

  var STORE_KEY = "zeitrechner-state-v4";
  function persist(){
    captureState();
    try{
      localStorage.setItem(STORE_KEY, JSON.stringify({ mode: mode, saved: saved }));
    }catch(e){}
  }
  function loadPersisted(){
    try{
      var raw = localStorage.getItem(STORE_KEY);
      if(!raw) return;
      var data = JSON.parse(raw);
      if(data && data.saved){
        if(data.saved.time) saved.time = data.saved.time;
        if(data.saved.num)  saved.num  = data.saved.num;
      }
      if(data && (data.mode==="time"||data.mode==="num")) mode = data.mode;
    }catch(e){}
  }

  var el = {
    tape: document.getElementById("tape"),
    sum: document.getElementById("sum"),
    pending: document.getElementById("pending"),
    current: document.getElementById("current"),
    pad: document.getElementById("pad"),
    undo: document.getElementById("undo"),
    modebar: document.getElementById("modebar")
  };

  function haptic(){ if(navigator.vibrate) try{navigator.vibrate(8);}catch(e){} }

  function pressKeyVisual(button){
    button.classList.remove("key-pop");
    button.classList.add("is-pressed");
  }

  function releaseKeyVisual(button){
    if(!button.classList.contains("is-pressed")) return;
    button.classList.remove("is-pressed");
    button.classList.remove("key-pop");
    // Reflow erzwingen, damit wiederholtes schnelles Tippen die Animation neu startet.
    void button.offsetWidth;
    button.classList.add("key-pop");
    window.setTimeout(function(){
      button.classList.remove("key-pop");
    }, 260);
  }

  /* ---------- Zeit-Helfer ----------
     Ohne ":" im entry: Auto-Modus — letzte 2 Ziffern = Minuten, Rest = Stunden (H:MM).
     Mit ":" im entry: Explizit-Modus — Felder werden links nach rechts eingegeben.
       Einzelne Ziffer in Min/Sek = Zehnerstelle (1 → 10, nicht 01).
       Leerfeld = 0. Bis zu 2 Doppelpunkte erlaubt (H:MM:SS).
     Beispiele: "145"→1:45, "1:45"→1:45, "1:1"→1:10, "1::15"→1:00:15
  */
  function pad2(n){ return (n<10?"0":"")+n; }

  function entryToSeconds(e){
    if(!e) return 0;
    var h, m, mStr, s, sStr, parts;
    if(!e.includes(":")){
      // Auto-Modus: letzte 2 = Min, Rest = Std
      m = Number.parseInt(e.slice(-2)||"0",10);
      h = Number.parseInt(e.slice(0,-2)||"0",10);
      return h*3600 + m*60;
    }
    parts = e.split(":");
    h = Number.parseInt(parts[0]||"0",10);
    mStr = parts[1]||"";
    m = Number.parseInt(mStr||"0",10);
    if(mStr.length===1) m *= 10; // Zehnerstelle
    s = 0;
    if(parts.length>=3){
      sStr = parts[2]||"";
      s = Number.parseInt(sStr||"0",10);
      if(sStr.length===1) s *= 10;
    }
    return h*3600 + m*60 + s;
  }
  function fmtTimeEntry(e){
    if(!e) return "0:00";
    var h, m, mStr, mDisp, parts, sStr, sDisp;
    if(!e.includes(":")){
      // Auto-Modus
      m = Number.parseInt(e.slice(-2)||"0",10);
      h = Number.parseInt(e.slice(0,-2)||"0",10);
      return h+":"+pad2(m);
    }
    parts = e.split(":");
    h = parts[0]||"0";
    mStr = parts[1]||"";
    if(mStr.length===0) mDisp="00"; else if(mStr.length===1) mDisp=mStr+"0"; else mDisp=mStr;
    if(parts.length===2) return h+":"+mDisp;
    sStr = parts[2]||"";
    if(sStr.length===0) sDisp="00"; else if(sStr.length===1) sDisp=sStr+"0"; else sDisp=sStr;
    return h+":"+mDisp+":"+sDisp;
  }
  function fmtSeconds(total){
    var neg = total<0; total=Math.abs(Math.round(total));
    var h=Math.floor(total/3600), m=Math.floor((total%3600)/60), s=total%60;
    var str;
    if(s===0 && h>0) str = h+":"+pad2(m);
    else if(h>0)     str = h+":"+pad2(m)+":"+pad2(s);
    else             str = m+":"+pad2(s);
    return (neg?"−":"")+str;
  }

  /* ---------- Zahl-Helfer ---------- */
  function fmtNum(n){
    if(!Number.isFinite(n)) return "—";
    var r = Math.round(n*1e6)/1e6;
    var s = (""+r);
    var parts = s.split(".");
    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,".");
    return parts.join(",");
  }

  /* ---------- Auswertung ---------- */
  function currentValue(){
    if(mode==="time") return entryToSeconds(entry);
    return entry==="" ? 0 : Number.parseFloat(entry.replace(",","."));
  }
  function valueToEntry(v){
    if(mode==="time"){
      var total=Math.abs(Math.round(v));
      var h=Math.floor(total/3600), m=Math.floor((total%3600)/60), s=total%60;
      // Ergebnis immer im expliziten Format H:MM oder H:MM:SS
      if(s>0) return h+":"+pad2(m)+":"+pad2(s);
      return h+":"+pad2(m);
    }
    if(!Number.isFinite(v)) return "";
    var r=Math.round(v*1e6)/1e6;
    return (""+r).replace(".",",");
  }
  function applyMulDiv(nums, ops){
    var j=0;
    while(j<ops.length){
      if(ops[j]==="*"||ops[j]==="/"){
        var a=nums[j], b=nums[j+1];
        var div=b===0?Number.NaN:a/b;
        var r=ops[j]==="*"?a*b:div;
        nums.splice(j,2,r); ops.splice(j,1);
      } else j++;
    }
  }
  function buildTerms(startValue, items){
    var nums=[startValue], ops=[];
    for(var t of items){ ops.push(t.op); nums.push(t.value); }
    return {nums:nums, ops:ops};
  }
  function evaluate(){
    var startIdx=0, lastSumValue=0, hasSumMarker=false;
    for(var si=steps.length-1;si>=0;si--){
      if(steps[si].type==="sum"){ startIdx=si+1; lastSumValue=steps[si].value; hasSumMarker=true; break; }
    }
    var rel=steps.slice(startIdx);
    if(rel.length===0) return hasSumMarker ? lastSumValue : 0;
    var terms = (hasSumMarker && rel[0].op!==null)
      ? buildTerms(lastSumValue, rel)
      : buildTerms(rel[0].value, rel.slice(1));
    applyMulDiv(terms.nums, terms.ops);
    var acc=terms.nums[0];
    for(var k=0;k<terms.ops.length;k++){
      acc=terms.ops[k]==="+"?acc+terms.nums[k+1]:acc-terms.nums[k+1];
    }
    return acc;
  }

  /* ---------- Rendering ---------- */
  function opSymbol(op){return op==="*"?"×":op==="/"?"÷":op==="-"?"−":"+";}
  function valueLabel(v){ return mode==="time"? fmtSeconds(v) : fmtNum(v); }

  function render(){
    // Tape
    el.tape.innerHTML="";
    if(steps.length!==0){
      var stepNum=0, firstInGroup=true;
      steps.forEach(function(st){
        var row=document.createElement("div");
        var val=document.createElement("div"); val.className="val"; val.textContent=valueLabel(st.value);
        if(st.type==="sum"){
          row.className="row sum-divider";
          var eq=document.createElement("div"); eq.className="sum-eq"; eq.textContent="=";
          var sp=document.createElement("div"); sp.style.flex="1";
          row.appendChild(eq); row.appendChild(sp); row.appendChild(val);
          firstInGroup=true;
        } else {
          stepNum++;
          row.className="row";
          var idx=document.createElement("div"); idx.className="idx"; idx.textContent=stepNum;
          var op=document.createElement("div"); op.className="op"; op.textContent=firstInGroup?"":opSymbol(st.op);
          row.appendChild(idx); row.appendChild(op); row.appendChild(val);
          firstInGroup=false;
        }
        el.tape.appendChild(row);
      });
      el.tape.scrollTop = el.tape.scrollHeight;
    }
    // Summe
    el.sum.textContent = valueLabel(evaluate());
    // Pending-Operator / aktuelle Eingabe
    el.pending.textContent = pendingOp ? opSymbol(pendingOp) : "";
    if(mode==="time"){
      el.current.textContent = entry==="" ? "0:00" : fmtTimeEntry(entry);
    } else if(entry===""){
      el.current.textContent = "0";
    } else if(entry.endsWith(",")){
      // Komma sofort sichtbar machen
      el.current.textContent = fmtNum(Number.parseFloat(entry.slice(0,-1).replace(",",".")||"0"))+",";
    } else {
      el.current.textContent = fmtNum(Number.parseFloat(entry.replace(",",".")));
    }
    // armed operator highlight
    Array.prototype.forEach.call(document.querySelectorAll(".pad .op"),function(b){
      b.classList.toggle("armed", b.dataset.op===pendingOp);
    });
    // Doppelpunkt leuchtet wenn expliziter Modus aktiv (entry enthält ":")
    var colonBtn = el.pad.querySelector(".colon");
    if(colonBtn && mode==="time") colonBtn.classList.toggle("armed", entry.includes(":"));
    if(ready) persist();
  }

  /* ---------- Eingabelogik ---------- */
  function commitEntry(){
    var v = currentValue();
    if(steps.length===0){
      steps.push({op:"+", value:v});
    } else if(pendingOp){
      steps.push({op:pendingOp, value:v});
    } else {
      steps.push({op:"+", value:v});
    }
    entry="";
  }

  function pressDigit(d){
    if(lastEntryWasResult){ entry=""; pendingOp=null; lastEntryWasResult=false; }
    if(mode==="time"){
      var parts = entry.split(":");
      var colons = parts.length-1;
      // Im aktuellen Min-/Sek-Feld max 2 Ziffern; im Auto-Modus max 9 Gesamt
      if(colons>=1 && parts[colons].length>=2) return;
      if(colons===0 && entry.length>=9) return;
      entry += d;
    } else {
      if(d==="." || d===","){
        if(entry.includes(",")) return;
        if(entry==="") entry="0";
        entry += ",";
      } else {
        if(entry==="0") entry=d; else entry+=d;
      }
    }
    render();
  }

  function pressOp(op){
    if(lastEntryWasResult){
      entry = "";
      lastEntryWasResult = false;
      pendingOp = op;
      render();
      return;
    }
    if(entry!=="" || steps.length===0){
      commitEntry();
    }
    pendingOp = op;
    render();
  }

  function pressEquals(){
    if(lastEntryWasResult) return;
    if(entry!=="") commitEntry();
    if(steps.length===0) return;
    var startIdx=0;
    for(var si=steps.length-1;si>=0;si--){
      if(steps[si].type==="sum"){ startIdx=si+1; break; }
    }
    if(startIdx>=steps.length) return;
    var res = evaluate();
    steps.push({type:"sum", value:res});
    entry = valueToEntry(res);
    pendingOp = null;
    lastEntryWasResult = true;
    render();
  }

  function pressColonTime(){
    if(lastEntryWasResult){ entry=""; pendingOp=null; lastEntryWasResult=false; }
    var colons = (entry.match(/:/g)||[]).length;
    if(colons>=2) return; // max. 2 Doppelpunkte (H:MM:SS)
    entry += ":";
    render();
  }

  function backspace(){
    if(entry!==""){ entry=entry.slice(0,-1); }
    render();
  }
  function clearAll(){
    entry=""; steps=[]; pendingOp=null; lastEntryWasResult=false;
    render();
  }
  function clearEntry(){
    if(lastEntryWasResult){ clearAll(); return; }
    entry=""; render();
  }
  function undo(){
    if(lastEntryWasResult){
      lastEntryWasResult = false;
      entry = "";
      pendingOp = null;
      if(steps.length>0 && steps[steps.length-1].type==="sum") steps.pop();
      render();
      return;
    }
    if(entry!==""){ entry=""; render(); return; }
    if(steps.length>0){ steps.pop(); pendingOp=null; }
    render();
  }

  /* ---------- Keypad-Aufbau ---------- */
  function buildPad(){
    el.pad.innerHTML="";
    var sep = mode==="time"
      ? {t:":",c:"colon",a:"sep"}
      : {t:",",c:"colon",a:"sep"};
    var rows = [
      [{t:"AC",c:"clear",a:"allclear"}, {t:"C",c:"clear-soft",a:"clear"}, {t:"⌫",c:"fn",a:"back"}, {t:"÷",c:"op",a:"op",op:"/"}],
      [{t:"7",a:"d"}, {t:"8",a:"d"}, {t:"9",a:"d"}, {t:"×",c:"op",a:"op",op:"*"}],
      [{t:"4",a:"d"}, {t:"5",a:"d"}, {t:"6",a:"d"}, {t:"−",c:"op",a:"op",op:"-"}],
      [{t:"1",a:"d"}, {t:"2",a:"d"}, {t:"3",a:"d"}, {t:"+",c:"op",a:"op",op:"+"}],
      [{t:"0",a:"d",wide:true}, sep, {t:"=",c:"eq",a:"eq"}]
    ];

    rows.forEach(function(r){
      r.forEach(function(k){
        var b=document.createElement("button");
        b.textContent=k.t;
        if(k.c) b.className=k.c;
        if(k.wide) b.classList.add("wide");
        if(k.op) b.dataset.op=k.op;
        b.addEventListener("pointerdown",function(){ pressKeyVisual(b); });
        b.addEventListener("pointerup",function(){ releaseKeyVisual(b); });
        b.addEventListener("pointercancel",function(){ releaseKeyVisual(b); });
        b.addEventListener("pointerleave",function(){ releaseKeyVisual(b); });
        b.addEventListener("click",function(){
          haptic();
          if(k.a==="d") pressDigit(k.t);
          else if(k.a==="op") pressOp(k.op);
          else if(k.a==="eq") pressEquals();
          else if(k.a==="back") backspace();
          else if(k.a==="allclear") clearAll();
          else if(k.a==="clear") clearEntry();
          else if(k.a==="sep") {
            if(mode==="num") pressDigit(",");
            else pressColonTime();
          }
        });
        el.pad.appendChild(b);
      });
    });
  }

  /* ---------- Modus ---------- */
  function setMode(m){
    if(m===mode) return;
    captureState();
    mode=m;
    restoreState(m);
    buildPad();
    Array.prototype.forEach.call(el.modebar.querySelectorAll(".modetab"),function(btn){
      btn.classList.toggle("active", btn.dataset.mode===m);
    });
    render();
    persist();
  }
  el.modebar.addEventListener("click",function(e){
    var b=e.target.closest(".modetab"); if(!b) return;
    haptic(); setMode(b.dataset.mode);
  });
  el.undo.addEventListener("click",function(){haptic();undo();});

  /* ---------- About-Dialog ---------- */
  var overlay = document.getElementById("aboutOverlay");
  document.getElementById("infoBtn").addEventListener("click",function(){
    haptic(); overlay.style.display="flex";
  });
  document.getElementById("aboutClose").addEventListener("click",function(){
    haptic(); overlay.style.display="none";
  });
  overlay.addEventListener("click",function(e){ if(e.target===this) this.style.display="none"; });

  /* ---------- Hardware-Tastatur ---------- */
  window.addEventListener("keydown",function(e){
    var k=e.key;
    if(k>="0"&&k<="9"){pressDigit(k);}
    else if(k==="+"){pressOp("+");}
    else if(k==="-"){pressOp("-");}
    else if(k==="*"){pressOp("*");}
    else if(k==="/"){e.preventDefault();pressOp("/");}
    else if(k==="Enter"||k==="="){e.preventDefault();pressEquals();}
    else if(k==="Backspace"){backspace();}
    else if(k==="Escape"){clearAll();}
    else if(k==="Delete"){clearEntry();}
    else if((k===","||k===".")&&mode==="num"){pressDigit(",");}
  });

  // Gespeicherten Zustand laden.
  loadPersisted();
  restoreState(mode);
  Array.prototype.forEach.call(el.modebar.querySelectorAll(".modetab"),function(btn){
    btn.classList.toggle("active", btn.dataset.mode===mode);
  });
  buildPad();
  ready = true;
  render();

  /* ---------- Service Worker ---------- */
  if("serviceWorker" in navigator){
    window.addEventListener("load",function(){
      navigator.serviceWorker.register("sw.js").catch(function(){});
    });
  }
})();
</script>
</body>
</html>
